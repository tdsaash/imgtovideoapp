services:
  - type: web
    name: image-split-video-studio
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HF_TOKEN
        sync: false
      - key: POLLINATIONS_API_KEY
        sync: false
