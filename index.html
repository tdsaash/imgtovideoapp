<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Split Video Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="workspace">
        <aside class="panel controls" aria-label="Controls">
          <div class="brand">
            <div class="mark">IV</div>
            <div>
              <h1>Image Split Video Studio</h1>
              <p>Split one grid image into animated scenes and export a video.</p>
            </div>
          </div>

          <div class="tabs" role="tablist" aria-label="Workspace">
            <button id="videoTab" class="tabButton active" type="button" role="tab" aria-selected="true" aria-controls="videoControls">Video</button>
            <button id="imageTab" class="tabButton" type="button" role="tab" aria-selected="false" aria-controls="imageControls">AI Image</button>
            <button id="editorTab" class="tabButton" type="button" role="tab" aria-selected="false" aria-controls="editorControls">Editor</button>
            <button id="gridTab" class="tabButton" type="button" role="tab" aria-selected="false" aria-controls="gridControls">Grid Split</button>
            <button id="audioTab" class="tabButton" type="button" role="tab" aria-selected="false" aria-controls="audioControls">Audio</button>
          </div>

          <div id="videoControls" class="tabPane active" role="tabpanel" aria-labelledby="videoTab">
            <label class="dropzone" for="imageInput">
              <input id="imageInput" type="file" accept="image/*" />
              <span class="dropIcon">+</span>
              <strong>Upload grid image</strong>
              <small>Best for 3 x 5 comic or story panels like your sample.</small>
            </label>

            <label class="audioDrop" for="audioInput">
              <input id="audioInput" type="file" accept="audio/*" />
              <span>Audio track</span>
              <strong id="audioFileName">Add music or voice</strong>
            </label>
            <audio id="audioPreview" controls hidden></audio>

            <div class="controlGrid">
              <label>
                Columns
                <input id="colsInput" type="number" min="1" max="12" value="3" />
              </label>
              <label>
                Rows
                <input id="rowsInput" type="number" min="1" max="20" value="5" />
              </label>
              <label>
                Grid gap
                <input id="gapInput" type="number" min="0" max="80" value="6" />
              </label>
              <label>
                Outer crop
                <input id="cropInput" type="number" min="0" max="80" value="0" />
              </label>
            </div>

            <label>
              Animation style
              <select id="styleInput">
                <option value="cinematic">Cinematic Push</option>
                <option value="drift">Slow Drift</option>
                <option value="reveal">Zoom Reveal</option>
                <option value="pulse">Soft Pulse</option>
                <option value="epic">Epic Parallax</option>
                <option value="mixed">Mixed Styles</option>
              </select>
            </label>

            <label>
              Effect style
              <select id="effectInput">
                <option value="none" selected>None</option>
                <option value="cinematic-ai">Cinematic AI</option>
                <option value="anime-glow">Anime Glow</option>
                <option value="action-shake">Action Shake</option>
                <option value="dream-blur">Dream Blur</option>
                <option value="vintage-film">Vintage Film</option>
              </select>
            </label>

            <div class="controlGrid">
              <label>
                Video ratio
                <select id="ratioInput">
                  <option value="fit">Fit to panels</option>
                  <option value="9:16" selected>9:16 Vertical</option>
                  <option value="1:1">1:1 Square</option>
                  <option value="4:5">4:5 Portrait</option>
                  <option value="16:9">16:9 Wide</option>
                </select>
              </label>
              <label>
                Image framing
                <select id="frameInput">
                  <option value="fit" selected>Fit full image</option>
                  <option value="fill">Fill frame</option>
                </select>
              </label>
              <label>
                Video format
                <select id="formatInput">
                  <option value="auto" selected>Auto mobile friendly</option>
                  <option value="mp4">MP4 if supported</option>
                  <option value="webm">WebM</option>
                </select>
              </label>
            </div>

            <div class="controlGrid">
              <label>
                Seconds / panel
                <input id="durationInput" type="number" min="0.8" max="10" step="0.1" value="2.2" />
              </label>
              <label>
                FPS
                <input id="fpsInput" type="number" min="12" max="60" value="30" />
              </label>
              <label>
                Width
                <input id="widthInput" type="number" min="320" max="2160" step="10" value="1080" />
              </label>
              <label>
                Height
                <input id="heightInput" type="number" min="320" max="3840" step="10" value="1920" />
              </label>
              <label>
                Audio start
                <input id="audioStartInput" type="number" min="0" step="0.1" value="0" />
              </label>
              <label>
                Audio end
                <input id="audioEndInput" type="number" min="0" step="0.1" value="0" />
              </label>
              <label>
                Audio volume
                <input id="audioVolumeInput" type="range" min="0" max="1" step="0.05" value="1" />
              </label>
              <label>
                Fade in
                <input id="audioFadeInInput" type="number" min="0" step="0.1" value="0" />
              </label>
              <label>
                Fade out
                <input id="audioFadeOutInput" type="number" min="0" step="0.1" value="0" />
              </label>
            </div>

            <div class="switchRow">
              <label class="check">
                <input id="fitVideoToAudioInput" type="checkbox" />
                <span>Fit video to audio</span>
              </label>
            </div>

            <div class="switchRow">
              <label class="check">
                <input id="autoLayoutInput" type="checkbox" checked />
                <span>Auto layout</span>
              </label>
              <label class="check">
                <input id="autoGridInput" type="checkbox" checked />
                <span>Auto grid cut</span>
              </label>
              <label class="check">
                <input id="cleanNumbersInput" type="checkbox" checked />
                <span>Hide source numbers</span>
              </label>
              <label class="check">
                <input id="captionInput" type="checkbox" />
                <span>Show scene label</span>
              </label>
              <label class="check">
                <input id="blurInput" type="checkbox" checked />
                <span>Blurred backdrop</span>
              </label>
            </div>

            <div class="actions">
              <button id="splitBtn" type="button">Split Image</button>
              <button id="downloadBtn" type="button" disabled>Download Panels</button>
              <button id="exportBtn" type="button" disabled>Export Video</button>
            </div>
          </div>

          <div id="imageControls" class="tabPane" role="tabpanel" aria-labelledby="imageTab" hidden>
            <label>
              Prompt
              <textarea id="promptInput" rows="5" placeholder="A dramatic comic panel of a hero entering a neon city, rain, cinematic lighting"></textarea>
            </label>

            <div class="controlGrid">
              <label>
                Provider
                <select id="imageProviderInput">
                  <option value="pollinations" selected>Pollinations Free</option>
                  <option value="huggingface">Hugging Face</option>
                </select>
              </label>
              <label>
                Image style
                <select id="imageStyleInput">
                  <option value="cinematic" selected>Cinematic</option>
                  <option value="anime">Anime</option>
                  <option value="cartoon">Cartoon</option>
                  <option value="3d">3D Render</option>
                  <option value="comic">Comic</option>
                  <option value="realistic">Realistic</option>
                  <option value="fantasy">Fantasy</option>
                </select>
              </label>
              <label>
                Model
                <select id="imageModelInput">
                  <option value="sana" selected>Sana Free</option>
                  <option value="flux">Flux Better</option>
                  <option value="gptimage-large">GPT Image Large</option>
                  <option value="seedream">Seedream</option>
                  <option value="kontext">Kontext</option>
                  <option value="black-forest-labs/FLUX.1-dev">FLUX.1 Dev</option>
                  <option value="stabilityai/stable-diffusion-xl-base-1.0">SDXL Base</option>
                  <option value="runwayml/stable-diffusion-v1-5">Stable Diffusion 1.5</option>
                </select>
              </label>
            </div>

            <div class="actions imageActions">
              <button id="generateImageBtn" type="button">Generate Image</button>
              <button id="useGeneratedBtn" type="button" disabled>Use for Video</button>
              <button id="downloadGeneratedBtn" type="button" disabled>Download Image</button>
            </div>
          </div>

          <div id="editorControls" class="tabPane" role="tabpanel" aria-labelledby="editorTab" hidden>
            <label class="dropzone editorDrop" for="editorImageInput">
              <input id="editorImageInput" type="file" accept="image/*" multiple />
              <span class="dropIcon">+</span>
              <strong>Drop editor images</strong>
              <small>Add one or more images, then adjust each scene duration.</small>
            </label>

            <label class="audioDrop editorAudioDrop" for="editorAudioInput">
              <input id="editorAudioInput" type="file" accept="audio/*" />
              <span>Editor audio</span>
              <strong id="editorAudioFileName">Add music or voice</strong>
            </label>
            <audio id="editorAudioPreview" controls hidden></audio>

            <div class="controlGrid">
              <label>
                Editor width
                <input id="editorWidthInput" type="number" min="320" max="2160" step="10" value="1080" />
              </label>
              <label>
                Editor height
                <input id="editorHeightInput" type="number" min="320" max="3840" step="10" value="1920" />
              </label>
              <label>
                Editor FPS
                <input id="editorFpsInput" type="number" min="12" max="60" value="30" />
              </label>
              <label>
                Animation
                <select id="editorStyleInput">
                  <option value="cinematic" selected>Cinematic Push</option>
                  <option value="drift">Slow Drift</option>
                  <option value="reveal">Zoom Reveal</option>
                  <option value="pulse">Soft Pulse</option>
                  <option value="epic">Epic Parallax</option>
                  <option value="story-reel">Story Reel</option>
                  <option value="mythic-cinema">Mythic Cinema</option>
                  <option value="ghibli-soft">Hand-Drawn Soft</option>
                  <option value="claymation">Claymation</option>
                  <option value="pixar-3d">Pixar 3D</option>
                  <option value="beat-cut">Beat Cut</option>
                  <option value="float-3d">3D Float</option>
                  <option value="smooth-pan">Smooth Pan</option>
                  <option value="zoom-swipe">Zoom Swipe</option>
                  <option value="spotlight">Spotlight</option>
                  <option value="mixed">Mixed Styles</option>
                </select>
              </label>
              <label>
                Effect
                <select id="editorEffectInput">
                  <option value="none" selected>None</option>
                  <option value="cinematic-ai">Cinematic AI</option>
                  <option value="anime-glow">Anime Glow</option>
                  <option value="action-shake">Action Shake</option>
                  <option value="dream-blur">Dream Blur</option>
                  <option value="vintage-film">Vintage Film</option>
                </select>
              </label>
              <label>
                Audio volume
                <input id="editorAudioVolumeInput" type="range" min="0" max="1" step="0.05" value="1" />
              </label>
            </div>

            <div class="switchRow">
              <label class="check">
                <input id="editorFitAudioInput" type="checkbox" />
                <span>Fit images to audio</span>
              </label>
            </div>

            <div id="editorTimeline" class="editorTimeline"></div>

            <div id="editorPhotoTools" class="photoTools" hidden>
              <canvas id="photoEditCanvas" width="720" height="720"></canvas>
              <div class="controlGrid">
                <label>
                  Zoom
                  <input id="photoZoomInput" type="range" min="1" max="3" step="0.05" value="1" />
                </label>
                <label>
                  Horizontal
                  <input id="photoXInput" type="range" min="-1" max="1" step="0.02" value="0" />
                </label>
                <label>
                  Vertical
                  <input id="photoYInput" type="range" min="-1" max="1" step="0.02" value="0" />
                </label>
              </div>
              <div class="actions">
                <button id="photoSaveBtn" type="button">Save Image Edit</button>
                <button id="photoResetBtn" type="button">Reset</button>
              </div>
            </div>

            <div class="actions editorActions">
            </div>
          </div>

          <div id="gridControls" class="tabPane" role="tabpanel" aria-labelledby="gridTab" hidden>
            <label class="dropzone gridDrop" for="gridImageInput">
              <input id="gridImageInput" type="file" accept="image/*" />
              <span class="dropIcon">+</span>
              <strong>Drop collage image</strong>
              <small>Detects straight grid lines and splits the image into tiles.</small>
            </label>

            <div class="controlGrid">
              <label>
                Split mode
                <select id="gridModeInput">
                  <option value="lines" selected>Use grid lines</option>
                  <option value="equal">Equal rows/columns</option>
                </select>
              </label>
              <label>
                Columns
                <input id="gridColsInput" type="number" min="1" max="12" value="3" />
              </label>
              <label>
                Rows
                <input id="gridRowsInput" type="number" min="1" max="12" value="3" />
              </label>
              <label>
                Line sensitivity
                <input id="gridSensitivityInput" type="range" min="0.15" max="0.75" step="0.05" value="0.35" />
              </label>
              <label>
                Min tile size
                <input id="gridMinTileInput" type="number" min="20" max="400" step="10" value="80" />
              </label>
            </div>

            <div class="actions gridActions">
              <button id="gridSplitBtn" type="button" disabled>Split Grid</button>
              <button id="gridUseEditorBtn" type="button" disabled>Use Tiles in Editor</button>
              <button id="gridDownloadBtn" type="button" disabled>Download Tiles</button>
            </div>
          </div>

          <div id="audioControls" class="tabPane" role="tabpanel" aria-labelledby="audioTab" hidden>
            <label class="audioDrop libraryVideoDrop" for="libraryVideoInput">
              <input id="libraryVideoInput" type="file" accept="video/*" />
              <span>Video file</span>
              <strong id="libraryVideoFileName">Add video to mix with audio</strong>
            </label>
            <video id="libraryVideoPreview" controls playsinline hidden></video>

            <label class="audioDrop libraryAudioDrop" for="libraryAudioInput">
              <input id="libraryAudioInput" type="file" accept="audio/*" />
              <span>Audio file</span>
              <strong id="libraryAudioFileName">Add local music or voice</strong>
            </label>
            <audio id="libraryAudioPreview" controls hidden></audio>

            <div class="actions audioActions">
              <button id="useAudioInEditorBtn" type="button" disabled>Use in Editor</button>
              <button id="useAudioInVideoBtn" type="button" disabled>Use in Video</button>
              <button id="mixVideoAudioBtn" type="button" disabled>Export Video + Audio</button>
            </div>
          </div>

          <div id="status" class="status">Upload an image to begin.</div>
        </aside>

        <section class="stage" aria-label="Preview">
          <div class="previewColumn">
            <div class="previewShell">
              <canvas id="previewCanvas" width="1080" height="1920"></canvas>
            </div>
            <div id="editorScrubPanel" class="scrubControl" hidden>
              <div class="previewButtons">
                <button id="editorPreviewBtn" type="button" disabled>Preview</button>
                <button id="editorStopBtn" type="button" disabled>Stop</button>
                <button id="editorExportBtn" type="button" disabled>Export Video</button>
              </div>
              <label>
                Preview position
                <input id="editorScrubInput" type="range" min="0" max="0" step="0.05" value="0" disabled />
              </label>
              <span id="editorTimeReadout">0.0 / 0.0 sec</span>
            </div>
            <div id="videoResult" class="videoResult" hidden>
              <video id="videoPreview" controls playsinline></video>
              <div class="videoActions">
                <a id="videoOpen" class="downloadLink" href="#" target="_blank" rel="noopener">Open Video</a>
                <a id="videoDownload" class="downloadLink" href="#" download>Download video</a>
                <button id="videoShare" class="shareButton" type="button" hidden>Share File</button>
                <button id="youtubeUpload" class="youtubeLink" type="button">YouTube</button>
              </div>
            </div>
            <div id="imageResult" class="imageResult" hidden>
              <img id="generatedImage" alt="Generated from prompt" />
            </div>
          </div>
          <div class="filmstrip" id="filmstrip" aria-label="Split image panels"></div>
          <div class="gridTiles" id="gridTiles" aria-label="Grid split tiles"></div>
        </section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
